education:
  - degree: PhD in Medicine (Medical Physics and Technology)
    institution: University of Oulu, Finland
    start: 2017-01-01
    end: 2021-07-01
    summary: |
      Thesis: "Computed tomography assessment of low-energy acetabular fractures in the elderly."
      Developed the first deep learning application for detecting hip osteoarthritis from clinical CT and identified CT-based structural risk factors for low-energy acetabular fractures.
      Published 3 first-author papers in Osteoporosis International, Annals of Biomedical Engineering, and Bone.
      Research featured in two Finnish national publications (Tekniikka&Talous and Kauppalehti).
  - degree: MSc in Biomedical and Clinical Technology (Ing.)
    institution: Czech Technical University, Prague & University of Groningen, Netherlands (Erasmus Mundus Joint Degree)
    start: 2013-09-01
    end: 2016-09-01
    summary: |
      Erasmus Mundus full-ride scholarship recipient (fewer than 5% acceptance rate).
      Joint master's degree across two European institutions in Biomedical Engineering.
  - degree: BSc in Biomedical Engineering (Summa Cum Laude)
    institution: Jimma University, Ethiopia
    start: 2009-09-01
    end: 2013-06-27
    summary: |
      Graduated with highest academic honors.
      Recognized as the best young scientist in Ethiopia for undergraduate thesis on wireless infant incubators.

experience:
  - role: Research Associate / Postdoctoral Research Fellow
    org: Mayo Clinic, Department of Radiology
    start: 2021-09-13
    summary: |
      Developing and validating machine learning methods for quantifying neurodegenerative disease from PET and MRI.
      Created THETA, a novel tau PET summary metric for Alzheimer's disease (published in Journal of Nuclear Medicine).
      Filed two invention disclosures with Mayo Clinic Ventures (THETA metric and automated PET tracer classifier).
      Leading projects on tau therapeutic windows for anti-amyloid therapy, MSA imaging signatures, MRI harmonization, brain age prediction, and synthetic tau PET generation.
      Contributing to multiple NIH-funded studies.

