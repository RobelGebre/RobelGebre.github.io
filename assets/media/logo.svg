<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 1600" role="img" aria-labelledby="title desc">
  <title id="title">Robel Gebre website logo</title>
  <desc id="desc">A horizontal academic brand logo with a clear brain icon, subtle faded imaging scanner, AI network nodes, and Robel Gebre wordmark.</desc>
  <defs>
