<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" role="img" aria-labelledby="title desc">
  <title id="title">Robel Gebre website icon</title>
  <desc id="desc">A square neuroimaging and AI icon showing a clear stylized brain, network nodes, orbit paths, and a subtle faded scanner background.</desc>
  <defs>
