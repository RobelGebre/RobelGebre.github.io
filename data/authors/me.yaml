bio: |
  I am a Research Associate in the Department of Radiology at Mayo Clinic, developing and validating quantitative imaging biomarkers for Alzheimer's disease and related neurodegenerative conditions.
  My work spans tau PET quantification, multisite MRI harmonization, disease progression modeling, and machine learning imaging signatures of rare disorders such as multiple system atrophy.
  I have filed two invention disclosures with Mayo Clinic Ventures and released three open-source software tools for the neuroimaging community.

