    <linearGradient id="goldOrbit" x1="900" y1="725" x2="1750" y2="1285" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6C75B"/>
      <stop offset="1" stop-color="#E5A51D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#06213D" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="2048" height="2048" fill="#FFFFFF"/>
